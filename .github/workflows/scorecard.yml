name: 'OpenSSF Scorecard'

on:
  push:
    branches: ['main']
  schedule:
    - cron: '30 1 * * 6' # Weekly on Saturdays

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload results to the Security tab
      security-events: write
      # Needed to publish results and request a private scoring run
      id-token: write
      # Needed to read the repo
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to enable the OpenSSF badge on the repository
          publish_results: true

      - name: Upload to GitHub code-scanning
        uses: github/codeql-action/upload-sarif@b0565cb28b456da32509aef995361ffcc63f40b0 # v3.28.15
        with:
          sarif_file: results.sarif
