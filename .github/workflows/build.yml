name: Build and Auto-Release App

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Select version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Auto-increment version, commit/tag it, and create a draft release
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Git Bot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Handle Version & Tag
        id: bump
        run: |
          set -euo pipefail
          BUMP_TYPE="${{ inputs.bump_type }}"
          if [ "$BUMP_TYPE" = "none" ]; then
            VERSION=$(node -p "require('./package.json').version")
            TAG="v$VERSION"

            if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "::error::Tag $TAG already exists. Exiting."
              exit 1
            fi

            git tag "$TAG"
            git push origin "$TAG"

            echo "version=$TAG" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          else
            NEW_VERSION=$(npm version $BUMP_TYPE -m "chore(release): bump version to %s [skip ci]")
            echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "tag=${NEW_VERSION}" >> $GITHUB_OUTPUT

            git push origin HEAD:${{ github.ref_name }}
            git push origin ${NEW_VERSION}
          fi
        shell: bash

      - name: Generate Dynamic Release Notes & Camo Badge
        run: |
          set -euo pipefail
          node -e '
          const fs = require("fs");
          const execSync = require("child_process").execSync;

          let lastTag = "";
          try {
            lastTag = execSync("git describe --tags --abbrev=0 HEAD^").toString().trim();
          } catch (e) {
            console.log("No previous tags found, using full history.");
          }

          const logCmd = lastTag ? `git log ${lastTag}..HEAD --pretty=format:"%s"` : "git log --pretty=format:\"%s\"";
          let commits = [];
          try {
            commits = execSync(logCmd).toString().trim().split("\n").filter(Boolean);
          } catch (e) {
            commits = execSync("git log -n 10 --pretty=format:\"%s\"").toString().trim().split("\n").filter(Boolean);
          }

          let news = [];
          let updates = [];
          let fixes = [];

          commits.forEach(msg => {
            if (
              msg.includes("[skip ci]") ||
              msg.startsWith("chore(release):") ||
              /^(merge branch|merge pull request)/i.test(msg)
            ) return;
            
            const cleanMsg = msg.replace(/^(feat|new|fix|chore|refactor|style|perf|docs|test)(\(.*?\))?:\s*/i, "");
            
            if (/^(feat|new)/i.test(msg)) {
              news.push(`- ${cleanMsg}`);
            } else if (/^(fix)/i.test(msg)) {
              fixes.push(`- ${cleanMsg}`);
            } else {
              updates.push(`- ${cleanMsg}`);
            }
          });

          if (news.length === 0) news.push("- Minor improvements and general core alignments.");
          if (updates.length === 0) updates.push("- Subsystem and dependency refinements.");
          if (fixes.length === 0) fixes.push("- Bug resolution and stability hardening.");

          const version = "${{ steps.bump.outputs.version }}";

          const body = `
          <p align="center">
            <img src="https://img.shields.io/badge/CaféVerse -${version}-orange?style=for-the-badge" alt="CaféVerse  Release Badge" />
          </p>

          ## 🚀 Release Notes - ${version}

          ### ✨ New
          ${news.join("\n")}

          ### 🔧 Update & Improvement
          ${updates.join("\n")}

          ### 🐛 Bug Fixed
          ${fixes.join("\n")}

          ---
          *This is an automated production build packaged securely on GitHub Actions.*
          `;

          fs.writeFileSync("release_notes.md", body.trim());
          '
        shell: bash

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: CaféVerse ${{ steps.bump.outputs.version }}
          body_path: release_notes.md
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Build the app binaries
  build:
    name: Build (${{ matrix.platform }} ${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            arch: x64
            build_cmd: npm run build:win -- --x64
          - platform: windows
            os: windows-latest
            arch: arm64
            build_cmd: npm run build:win -- --arm64
          - platform: linux
            os: ubuntu-latest
            arch: x64
            build_cmd: npm run build:linux -- AppImage deb --x64
          - platform: linux
            os: ubuntu-latest
            arch: arm64
            build_cmd: npm run build:linux -- AppImage deb --arm64

    steps:
      - name: Checkout Tagged Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/cache
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        run: npm install

      - name: Build Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SIGN: false
        run: |
          set -euo pipefail
          ${{ matrix.build_cmd }}
        shell: bash

      - name: Verify Build Output
        run: |
          set -euo pipefail
          echo "Build artifacts in dist/:"
          ls -lh dist/ 2>/dev/null || echo "dist/ directory not found"
          FILE_COUNT=$(find dist -maxdepth 1 -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" \) 2>/dev/null | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::No distributable files found in dist/"
            exit 1
          fi
          echo "Found $FILE_COUNT distributable file(s)"
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
          retention-days: 5

      - name: Upload Binaries to Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            dist/*.exe
            dist/*.msi
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            !dist/win-unpacked
            !dist/linux-unpacked
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: Finalize and publish the draft release after all platforms succeed
  publish:
    name: Publish Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
