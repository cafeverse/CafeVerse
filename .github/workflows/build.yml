name: Build and Auto-Release App

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Select version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    uses: ./.github/workflows/security-audit.yml
    permissions:
      contents: read

  audit:
    uses: ./.github/workflows/npm-audit.yml
    permissions:
      contents: read

  analyze:
    uses: ./.github/workflows/codeql.yml
    permissions:
      actions: read
      contents: read
      security-events: write

  # Job 1: Auto-increment version, commit/tag it, and create a draft release
  prepare:
    name: Prepare Release
    needs: [trufflehog, audit, analyze]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      prerelease: ${{ steps.bump.outputs.prerelease }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Configure Git Bot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Configure Git Remote
        run: git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"

      - name: Handle Version & Tag
        id: bump
        run: |
          set -euo pipefail
          BUMP_TYPE="${{ inputs.bump_type }}"
          if [ "$BUMP_TYPE" = "none" ]; then
            VERSION=$(node -p "require('./package.json').version")
            TAG="v$VERSION"

            if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "::error::Tag $TAG already exists. Exiting."
              exit 1
            fi

            git tag "$TAG"
            git push origin "$TAG"

            echo "version=$TAG" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT

            if [[ "$VERSION" =~ ^0\. ]]; then
              echo "prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          else
            NEW_VERSION=$(npm version $BUMP_TYPE -m "chore(release): bump version to %s [skip ci]")
            echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "tag=${NEW_VERSION}" >> $GITHUB_OUTPUT

            PLAIN_VERSION="${NEW_VERSION#v}"
            if [[ "$PLAIN_VERSION" =~ ^0\. ]]; then
              echo "prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi

            git push origin HEAD:${{ github.ref_name }}
            git push origin ${NEW_VERSION}
          fi
        shell: bash

      - name: Generate Dynamic Release Notes & Camo Badge
        run: |
          set -euo pipefail
          node -e '
          const fs = require("fs");
          const execSync = require("child_process").execSync;

          let lastTag = "";
          try {
            lastTag = execSync("git describe --tags --abbrev=0 HEAD^").toString().trim();
          } catch (e) {
            console.log("No previous tags found, using full history.");
          }

          const logCmd = lastTag ? `git log ${lastTag}..HEAD --pretty=format:"%s"` : "git log --pretty=format:\"%s\"";
          let commits = [];
          try {
            commits = execSync(logCmd).toString().trim().split("\n").filter(Boolean);
          } catch (e) {
            commits = execSync("git log -n 10 --pretty=format:\"%s\"").toString().trim().split("\n").filter(Boolean);
          }

          let news = [];
          let updates = [];
          let fixes = [];

          commits.forEach(msg => {
            if (
              msg.includes("[skip ci]") ||
              msg.startsWith("chore(release):") ||
              /^(merge branch|merge pull request)/i.test(msg)
            ) return;
            
            const cleanMsg = msg.replace(/^(feat|new|fix|chore|refactor|style|perf|docs|test)(\(.*?\))?:\s*/i, "");
            
            if (/^(feat|new)/i.test(msg)) {
              news.push(`- ${cleanMsg}`);
            } else if (/^(fix)/i.test(msg)) {
              fixes.push(`- ${cleanMsg}`);
            } else {
              updates.push(`- ${cleanMsg}`);
            }
          });

          const version = "${{ steps.bump.outputs.version }}";

          let body = `<p align="center">\n  <img src="https://img.shields.io/badge/CaféVerse-${version}-orange?style=for-the-badge" alt="CaféVerse Release Badge" />\n</p>\n\n## 🚀 Release Notes - ${version}\n`;

          if (news.length > 0) {
            body += `\n### ✨ New\n${news.join("\n")}\n`;
          }
          if (updates.length > 0) {
            body += `\n### 🔧 Update & Improvement\n${updates.join("\n")}\n`;
          }
          if (fixes.length > 0) {
            body += `\n### 🐛 Bug Fixed\n${fixes.join("\n")}\n`;
          }

          fs.writeFileSync("release_notes.md", body.trim());
          '
        shell: bash

      - name: Create Draft Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: CaféVerse ${{ steps.bump.outputs.version }}
          body_path: release_notes.md
          draft: true
          prerelease: ${{ steps.bump.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Build the app binaries
  build:
    name: Build (${{ matrix.platform }} ${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            arch: x64
            build_cmd: bun run build:win -- --x64
          - platform: linux
            os: ubuntu-latest
            arch: x64
            build_cmd: bun run build:linux -- AppImage deb --x64

    steps:
      - name: Checkout Tagged Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.2.x

      - name: Cache Electron
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/cache
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-${{ hashFiles('bun.lock') }}

      - name: Install Dependencies with Bun
        run: bun install --frozen-lockfile

      - name: Build Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          set -euo pipefail
          ${{ matrix.build_cmd }}
        shell: bash

      - name: Verify Build Output
        run: |
          set -euo pipefail
          echo "Build artifacts in dist/:"
          ls -lh dist/ 2>/dev/null || echo "dist/ directory not found"
          FILE_COUNT=$(find dist -maxdepth 1 -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" \) 2>/dev/null | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::error::No distributable files found in dist/"
            exit 1
          fi
          echo "Found $FILE_COUNT distributable file(s)"
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
          retention-days: 5

      - name: Upload Binaries to Draft Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            dist/*.exe
            dist/*.msi
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            !dist/win-unpacked
            !dist/linux-unpacked
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: Finalize and publish the draft release after all platforms succeed
  publish:
    name: Publish Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Publish Draft Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
